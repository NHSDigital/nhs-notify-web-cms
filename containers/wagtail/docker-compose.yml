  wagtail:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: python:3.12-slim
    container_name: wagtail-app
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

