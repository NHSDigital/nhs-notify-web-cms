services:
  postgres:
    image: postgres:16.6
    container_name: wagtail-db
    environment:
      POSTGRES_DB: wagtail
      POSTGRES_USER: wagtail
      POSTGRES_PASSWORD: wagtail-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagtail"]
      interval: 10s
      timeout: 5s
      retries: 5

  wagtail:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: python:3.12-slim
    container_name: wagtail-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://wagtail:wagtail-dev-password@postgres:5432/wagtail
      - DJANGO_SETTINGS_MODULE=cms.settings.dev
      - SECRET_KEY=django-insecure-dev-key-change-in-production
    ports:
      - "8080:8080"
    volumes:
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  media_files:
    driver: local
